name: Android CI

# Run validation on every push and pull request to the main branches, and
# build/upload a deterministic release APK when a GitHub Release is published.
# No emulator is started at any point. No LTA AccountKey, signing key, or
# other runtime secret is required. The only secret used is the implicit
# GitHub Actions token, and only to upload the release asset.
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]

# Cancel in-progress validation runs for the same ref to save CI minutes, but
# never cancel a release build once it has started.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  validate:
    name: Validate (typecheck + expo check + workflow checks)
    runs-on: ubuntu-latest
    # Least-privilege: validation only checks out and reads repository content.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Expo dependency check
        env:
          EXPO_NO_TELEMETRY: "1"
        run: npx expo install --check

      - name: Validate Android workflow YAML
        # Lightweight static check: make sure the workflow file itself is
        # parseable YAML so a syntax error cannot silently break CI.
        run: python3 -c "import yaml; yaml.safe_load(open('.github/workflows/android.yml')); print('YAML is valid')"

      - name: Set up Liberica JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project
        env:
          EXPO_NO_TELEMETRY: "1"
        # Push/PR validation only runs the Android prebuild so we can prove
        # the generated project is well-formed. We deliberately do NOT run
        # `./gradlew assembleDebug` or any debug APK build here; that step is
        # reserved for the release.published workflow to keep CI fast and
        # avoid producing debug APKs on every commit.
        run: npx expo prebuild --platform android --no-install --clean

  release:
    name: Release APK
    # Only build and upload an APK when a release is actually published.
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: validate
    runs-on: ubuntu-latest
    # The release job needs write access to attach the APK to the GitHub
    # Release; the validation job intentionally does not.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Expo dependency check
        env:
          EXPO_NO_TELEMETRY: "1"
        run: npx expo install --check

      - name: Set up Liberica JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project
        env:
          EXPO_NO_TELEMETRY: "1"
        run: npx expo prebuild --platform android --no-install --clean

      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --stacktrace

      - name: Prepare deterministic release asset
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/sg-bus-timings-android.apk
          ls -la dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sg-bus-timings-android
          path: dist/sg-bus-timings-android.apk
          if-no-files-found: error

      - name: Upload APK to GitHub release
        env:
          # The only "secret" used by this workflow is the implicit GitHub
          # Actions token, which is required to attach the release asset.
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/sg-bus-timings-android.apk --clobber
